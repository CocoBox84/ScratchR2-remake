<div id="topnav">
    <div class="innerwrap">
        <div class="container">
            <a href="/" class="logo"><span class="scratch"></span></a>
            <ul class="site-nav logged-in">
                <li class="logged-in"><a id="project-create" href="/projects/editor/?tip_bar=home"
                        class="logged-in">Create</a></li>
                <li class="logged-in"><a href="/explore/?date=this_month" class="logged-in">Explore</a></li>
                <li class="logged-in"><a href="/discuss/" class="logged-in">Discuss</a></li>
                <li class="logged-in"><a href="/about/" class="logged-in">About</a></li>
                <li class="last logged-in"><a href="/help/">Help</a></li>
            </ul>
            <form class="search logged-in" action="/search/google_results/" method="get">
                <input class="glass logged-in" value="" type="submit">

                <input id="search-input" class="logged-in" placeholder="Search" name="q" type="text">


                <input name="date" class="logged-in" value="anytime" type="hidden">
                <input name="sort_by" class="logged-in" value="datetime_shared" type="hidden">

            </form>
            {% if user.is_authenticated %}
            <ul class="account-nav logged-in last">
                <li class="messages"><a title="messages - updates and notices" href="/messages/"
                        class="messages-icon"><span
                            class="notificationsCount none {% if user.unread_messages_count > 0 %}some{% endif %}">{{
                            user.unread_messages_count }}</span></a></li>
                <li class="my-stuff"><a title="my stuff - manage projects and studios" href="/mystuff/"
                        class="mystuff-icon"></a></li>
                <li class="logged-in-user dropdown"><span class="user-name dropdown-toggle" data-toggle="dropdown">
                        <img class="user-icon" src="{{ user.profile.avatar.url|default:'/static/default.png' }}"
                            width="24" height="24">
                        <span class="a">{{ user.username }}</span>
                        <span class="caret"></span></span>
                    <div class="dropdown-menu blue">
                        <ul class="user-nav">
                            <li><a href="/users/{{ user.username }}/">Profile</a></li>
                            <li><a href="/mystuff/">My Stuff</a></li>
                            <li><a href="/accounts/settings/">Account settings</a></li>
                            <li id="logout" class="logout divider"><a href="JavaScript:Scratch.auth.logout();">Sign
                                    out</a></li>
                        </ul>
                    </div>
                </li>
            </ul>
            {% else %}
            <ul class="account-nav">
                <li class="join-scratch" data-control="registration"><a href="/signup" style="  color: #fff !important;
  font-size: 15px !important;
  padding: 0 15px !important;
  display: inline-block !important;
   text-decoration: none !important"><span class=""><span>Join Scratch</span></span></a>
                </li>
                <li id="login-dropdown last" class="sign-in dropdown">
                    <span data-toggle="dropdown" class="dropdown-toggle">
                        <span>Sign in</span></span></li>
                    <div class="popover bottom dropdown-menu">
                        <div class="arrow"></div>
                        <div class="popover-content">
                            <form method="post" id="login" action="#"><label for="username">Username</label><input
                                    type="text" id="login_dropdown_username" name="username" maxlength="30"
                                    class="wide username"><label for="password" class="password">Password</label><input
                                    type="password" name="password" class="wide password">
                                <div class="ajax-loader" style="display:none; float: left;"></div><button
                                    type="submit">Sign in</button><span class="forgot-password"><a
                                        href="/web/20140430133144/http://scratch.mit.edu/accounts/password_reset/">Forgot
                                        password?</a></span>
                                <div class="error"></div>
                            </form>
                        </div>
                    </div>
                </li>
            <li data-control="modal-login" class="sign-in mobile"><a href="/login" style="  color: #fff !important;
  font-size: 15px !important;
  padding: 0 15px !important;
  display: inline-block !important;
   text-decoration: none !important"><span>Sign in</span></a></li>
            </ul>
            {% endif %}
        </div>
    </div><!-- innerwrap -->
</div>
