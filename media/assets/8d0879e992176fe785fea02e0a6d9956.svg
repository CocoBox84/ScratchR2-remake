  <text id="ID0.16609588684514165" fill="#000000" x="94" y="73.7" text-anchor="start" font-family="Scratch" font-size="22" transform="matrix(1.4507299661636353, 0, 0, 1.4507299661636353, 51, 30.7)">Scratch 2.0 (2013 - 2019)</text>
  <text id="ID0.015269626397639513" fill="#000000" x="98" y="92.7" text-anchor="start" font-family="Scratch" font-size="22" transform="matrix(0.8007019758224487, 0, 0, 0.8007019758224487, 44, 72.35)">A new feature of Scratch 2.0 was the new website.It had a fully online editor. This editor had newfeatures:(1) Custom blocks:User's can create their own blocks! And becauseof the new "Run without screen refresh" optionUsers can now create real games! 3D games, 2D games, Platformers, and the legendaryScratch user "Griffpatch" joined and showed usthe power of the new Scratch!(2) Cloud variables:Greate for online games!(3) Vector image editor!</text>
