<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="425.2821350097656" height="338" viewBox="0 0 425.2821350097656 338">
  
  <path id="ID0.9514864571392536" fill="#DDDEDE" stroke="none" d="M 3 0.5 L 228.5 0.5 L 228.5 337.5 L 3 337.5 L 3 0.5 Z " stroke-width="0.8677637969732646"/>
  <text  fill="#663B00" text-anchor="start" font-family="Gloria" font-size="22" transform="matrix(0.477002 0 0 0.477002 238.011495 14.195505)" stroke-width="1" alignment-baseline="text-before-edge"  >You may have noticed that, although our
player enjoys a nice smooth jump curve, his
left and right walking motion does not share
the same smooth movement. The reason is
that he has no horizontal momentum. We
have a speed y, but no speed x. This is the
script as we have it now. When a key is
pressed it walks a fixed 4 pixels left or
right.</text>
