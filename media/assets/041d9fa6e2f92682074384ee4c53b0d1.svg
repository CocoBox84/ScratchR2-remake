<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="350.703125" height="192.405029296875" viewBox="0.7539999485015869 7.091058731079102 350.703125 192.405029296875">
  
  <path id="ID0.16807416081428528" fill="none" stroke="#990000" stroke-width="0.6640625" d="M 49.2719 157.1602 L 93.1 157.1602 L 93.1 198.9961 L 49.2719 198.9961 L 49.2719 157.1602 Z "/>
  <text  fill="#663B00" text-anchor="start" font-family="Gloria" font-size="22" transform="matrix(0.477002 0 0 0.477002 0.06149500000000008 -3.2045250000000003)" stroke-width="1" alignment-baseline="text-before-edge"  >The solution to this problem is to replace our beautiful cat costume with a box! :)
The nice thing about a box is that it has perfectly smooth edges and cannot get
caught on anything. This box is known as a Hitbox because it will be used to detect
when it is 'hit' by another sprite (in our case, when it hits the ground). However,
although we use the box to detect collisions, we would still show the cat to as the
player.! Here it is in action, notice how you can no longer get caught on an edge?
Move you mouse over the icons below to show the hitbox or cat view:</text>
  <image id="hitbox" width="112" height="180" xlink:href="data:image/png;base64," transform="matrix(0.13276711106300354,0,0,0.13276711106300354,63.3,170.1)" stroke-width="1" style="image-rendering: optimizespeed; image-rendering: pixelated;"/>
