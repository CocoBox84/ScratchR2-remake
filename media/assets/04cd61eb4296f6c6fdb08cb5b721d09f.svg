<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="373" height="268.5089416503906" viewBox="-0.5 6.991058349609375 373 268.5089416503906">
  
  <text  fill="#663B00" text-anchor="start" font-family="Gloria" font-size="22" transform="matrix(0.477002 0 0 0.477002 7.011495000000001 -3.304525)" stroke-width="1" alignment-baseline="text-before-edge"  >And here is the final super neat script. This time we have removed the need to check
for the frame getting to 8 and being reset to 0 by using the 'mod' block (mod stands
for modulus and it gives us the remainder of dividing the first number by the second).
What this does in practical terms is take the left hand number and prevent it reaching
or being larger than the right hand by continually looping it back to 0. This is exactly
what we were doing before with all those scripts and so is perfect for this use!</text>
  <image id="8c" width="372" height="144" xlink:href="data:image/png;base64," transform="matrix(1,0,0,1,0,131)" stroke-width="1" style="image-rendering: optimizespeed; image-rendering: pixelated;"/>
</svg>