<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="414.09375000314117" height="275.5421447785318" viewBox="1.2539999469309953 7.09105872950851 414.09375000314117 275.5421447785318">
  
  <text  fill="#663B00" text-anchor="start" font-family="Gloria" font-size="22" transform="matrix(0.477002 0 0 0.477002 1.061495 -3.2045250000000003)" stroke-width="1" alignment-baseline="text-before-edge"  >To create a hitbox, you must add a 'new' costume to your player sprite and name it
'hitbox' (or something else you'll remember). It should be roughly the same size as the
player sprite, but be a perfect filled rectangle. It should also be perfectly centered
horizontally... that is, if you zoom in using the paint editor and use the 'set costume
center' tool, it should have the same number of pixels or grid lines to the left of the
center as to the right of center up to the edge of the sprite.</text>
  <image id="hitbox2" width="306" height="360" xlink:href="data:image/png;base64," transform="matrix(0.3871755301952362,0,0,0.3871755301952362,185.6,142.75)" stroke-width="1" style="image-rendering: optimizespeed; image-rendering: pixelated;"/>
