<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="370.6415100097656" height="244.50894165039062" viewBox="-0.5 6.991058349609375 370.6415100097656 244.50894165039062">
  
  <text  fill="#663B00" text-anchor="start" font-family="Gloria" font-size="22" transform="matrix(0.477002 0 0 0.477002 0.511495 -3.304525)" stroke-width="1" alignment-baseline="text-before-edge"  >To achieve this effect, all you need to do is have the 'ground' sprite contain the hard
lines that the player can walk upon in a separate sprite to the actual background
graphics. Then ensure the ground sprite is either behind the background, or you can
set it's ghost effect to 100 which makes it invisible, but doesn't stop our touching block
from detecting collisions. Because the ground sprite is completely separate to the visual
level, you don't have to worry about colours or even shapes getting in the way. In my
example I even have the foreground tree as another sprite so that it can go in front
of the player.
 
For your reference, the ghost effect is applied using this block:</text>
  <image id="Ghost" width="187" height="39" xlink:href="data:image/png;base64," transform="matrix(1,0,0,1,0,212)" stroke-width="1" style="image-rendering: optimizespeed; image-rendering: pixelated;"/>
</svg>